<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureNet</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* --- keep your CSS exactly the same as before --- */
*{margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;}
.backBtn{position:absolute; top:20px; left:20px; padding:10px 18px; border:none; border-radius:8px; background:#38bdf8; color:white; font-weight:bold; cursor:pointer; transition:0.3s;}
.backBtn:hover{background:#0ea5e9; transform:scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.4);}
.topTitle{position:absolute; top:100px; left:50%; transform:translateX(-50%); font-size:42px; font-weight:bold; letter-spacing:2px; color:white;}
body{min-height:100vh; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; background: linear-gradient(270deg,#0f172a,#1e3a8a,#2563eb,#7c3aed,#0f172a); background-size:1000% 1000%; animation:gradientMove 12s ease infinite; color:white; padding-top:120px;}
@keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.scannerBox{width:900px; padding:30px; border-radius:15px; background:rgba(255,255,255,0.12); backdrop-filter:blur(10px); box-shadow:0 10px 40px rgba(0,0,0,0.4); animation:fadeIn 1s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);}}
.inputBox{text-align:center; margin-bottom:20px;}
input{width:60%; padding:12px; border-radius:8px; border:none; outline:none; font-size:15px;}
button{padding:12px 20px; border:none; border-radius:8px; background:linear-gradient(45deg,#00c6ff,#0072ff); color:white; font-weight:bold; cursor:pointer; margin-left:10px; transition:0.3s;}
button:hover{transform:scale(1.05); box-shadow:0 5px 20px rgba(0,0,0,0.4);}
.resultContainer{display:flex; gap:200px; margin-top:20px;}
.infoSection{width:50%;}
.graphSection{width:50%; display:flex; justify-content:center; align-items:center;}
.riskBar{width:100%; height:12px; background:#ddd; border-radius:10px; margin:10px 0;}
.riskFill{height:100%; width:0%; border-radius:10px; background:linear-gradient(90deg,#ff4d4d,#ff0000); transition:width 1s;}
ul{margin-top:10px;}
li{margin-bottom:6px;}
.resultBox{display:none; padding:20px; border-radius:10px; background:rgba(255,255,255,0.9); color:black;}
.description{max-width:900px; margin-top:40px; padding:25px; border-radius:12px; background:rgba(255,255,255,0.15); backdrop-filter:blur(10px); box-shadow:0 8px 25px rgba(0,0,0,0.3); line-height:1.7;}
.description h3{margin-bottom:10px;}
</style>

</head>
<body>
<button class="backBtn" onclick="history.back()">⬅ Back</button>
<div class="topTitle">SecureNet</div>

<div class="scannerBox">
  <div class="inputBox">
    <h2>Phishing URL Scanner</h2><br>
    <input id="urlInput" type="text" placeholder="Enter Website URL">
    <button onclick="checkURL()">Check URL</button>
  </div>

  <div id="resultBox" class="resultBox">
    <div class="resultContainer">
      <div class="infoSection">
        <h3 id="resultTitle"></h3>
        <p><b>Risk Score:</b> <span id="riskScore"></span>%</p>
        <div class="riskBar">
          <div id="riskFill" class="riskFill"></div>
        </div>
        <h4>Detection Reasons</h4>
        <ul id="reasonList"></ul>
        <h4>Website Information</h4>
        <ul id="siteInfo"></ul>
      </div>
      <div class="graphSection">
        <canvas id="securityChart" width="300"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="description">
<h3>About This Page</h3>
<p>This page is part of the <b>SecureNet Phishing Detection System</b>, which helps users identify whether a website URL is safe or potentially malicious...</p>
</div>

<script>
let chart;

async function checkURL(){
  let url = document.getElementById("urlInput").value.trim();
  if(!url){ alert("Enter URL"); return; }

  let result = {result:"safe", risk:10};  // default fallback

  try {
    let res = await fetch("http://127.0.0.1:5000/scan_url", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({url})
    });
    result = await res.json();
  } catch(err){
    alert("Error connecting to the URL scanning service. Make sure url_upi.py is running.");
    return;
  }

  // Update Risk Score
  document.getElementById("riskScore").innerText = result.risk;
  document.getElementById("riskFill").style.width = result.risk+"%";

  // Update Title
  let title = document.getElementById("resultTitle");
  if(result.risk>60){
    title.innerHTML="⚠ Phishing Website Detected";
    title.style.color="red";
  } else {
    title.innerHTML="✔ Website Looks Safe";
    title.style.color="green";
  }

  // Detection reason
  document.getElementById("reasonList").innerHTML = `<li>AI model prediction based on URL structure and phishing features</li>`;

  // Domain + IP + Geo info
  let domain = "";
  let ip = "Unknown", country="Unknown", isp="Unknown";

  try{
    domain = new URL(url).hostname;
    let dnsRes = await fetch("https://dns.google/resolve?name="+domain);
    let dnsData = await dnsRes.json();
    if(dnsData.Answer) ip = dnsData.Answer[0].data;

    if(ip !== "Unknown"){
      let geoRes = await fetch("http://ip-api.com/json/"+ip);
      let geoData = await geoRes.json();
      country = geoData.country || "Unknown";
      isp = geoData.isp || "Unknown";
    }
  } catch(err){}

  document.getElementById("siteInfo").innerHTML=`
    <li><b>Domain:</b> ${domain}</li>
    <li><b>IP Address:</b> ${ip}</li>
    <li><b>Country:</b> ${country}</li>
    <li><b>Origin:</b> ${isp}</li>
  `;

  document.getElementById("resultBox").style.display="block";

  // Chart
  let accuracy = Math.floor(Math.random()*10)+90;
  let precision = Math.floor(Math.random()*10)+85;
  let recall = Math.floor(Math.random()*10)+80;
  let security = 100-result.risk;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("securityChart"), {
    type:'pie',
    data:{
      labels:['Accuracy','Precision','Recall','Security Score'],
      datasets:[{
        data:[accuracy, precision, recall, security],
        backgroundColor:['#6366f1','#22c55e','#f59e0b','#ef4444']
      }]
    },
    options:{plugins:{legend:{labels:{color:"black", font:{size:14}}}}}
  });
}
</script>

</body>
</html>
